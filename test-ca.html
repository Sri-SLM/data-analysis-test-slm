<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C-A Analytics</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Baloo+2:wght@400;600&family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg-1:#050417;
      --bg-2:#071029;
      --accent-1:#ff5aa6; /* pink */
      --accent-2:#ffd86b; /* sunny */
      --accent-3:#3fffe0; /* mint */
      --neon-1:#00ffe1; /* cyan neon */
      --neon-2:#8b5cf6; /* purple neon */
      --card:rgba(2,8,23,0.64);
      --muted:#9aa4b2;
      --text:#e6f7ff;
      --hud:#041224;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family: 'Poppins', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
      color:var(--text);
      min-height:100vh;
      background:
        radial-gradient(900px 400px at 8% 12%, rgba(255,90,130,0.06), transparent 10%),
        radial-gradient(700px 350px at 92% 82%, rgba(0,255,225,0.05), transparent 10%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
      display:flex;flex-direction:column;gap:24px;padding:28px;
      overflow-x:hidden;position:relative;background-attachment:fixed;
    }

    /* subtle grid overlay for HUD/gamer feel */
    .grid-overlay{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px, 40px 40px;mix-blend-mode:overlay}

    /* scanlines */
    body::before{content:'';position:fixed;inset:0;z-index:2;pointer-events:none;background-image:repeating-linear-gradient( to bottom, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 3px);opacity:0.18}

    /* playful bubbles (decorative) */
    .bubbles{pointer-events:none;position:fixed;inset:0;z-index:0}
    .bubble{position:absolute;border-radius:50%;opacity:.9;filter:blur(6px);mix-blend-mode:screen}
    .bubble.b1{width:220px;height:220px;left:-60px;top:10%;background:linear-gradient(135deg,var(--accent-1),#ff88c2);filter:blur(10px);opacity:0.85}
    .bubble.b2{width:140px;height:140px;left:10%;top:65%;background:linear-gradient(135deg,var(--accent-2),#ffeaa8);filter:blur(8px);opacity:0.6}
    .bubble.b3{width:320px;height:320px;right:-80px;top:20%;background:linear-gradient(135deg,var(--accent-3),#b8fff0);filter:blur(14px);opacity:0.7}

    /* ensure content sits above overlays */
    .header,.container,.footer{position:relative;z-index:10}

    /* Header */
    .header{position:relative;z-index:20;display:flex;flex-direction:column;gap:14px}
    .title-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .title{font-family:'Baloo 2', 'Poppins', sans-serif;font-size:26px;color:var(--text);letter-spacing:0.2px}

    /* Tabs - neon HUD pills */
    .tabs{display:flex;flex-wrap:wrap;gap:10px}
    .tab{cursor:pointer;padding:8px 14px;border-radius:10px;font-weight:700;font-size:13px;background:transparent;border:1px solid rgba(255,255,255,0.04);color:var(--text);transition:transform .12s ease,box-shadow .12s ease;text-transform:uppercase;letter-spacing:0.8px}
    .tab:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,0.2)}
    .tab-priority{background:linear-gradient(90deg,var(--neon-1),#66fff0);color:#041224;padding:10px 18px;border-radius:12px;box-shadow:0 8px 36px rgba(0,255,225,0.12),0 0 20px rgba(0,255,225,0.06)}
    .tab-priorityPRO{background:linear-gradient(90deg,var(--neon-2),#ff6ad5);color:#041224;padding:10px 18px;border-radius:12px;box-shadow:0 8px 36px rgba(139,92,246,0.12),0 0 18px rgba(247,111,202,0.06);position:relative;overflow:hidden}
    .tab-priorityPRO::after{content:'';position:absolute;left:-40%;top:0;width:40%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06));transform:skewX(-12deg);animation:glide 3.2s linear infinite}
    @keyframes glide{0%{left:-40%}100%{left:120%}}
    .tab.simple{background:linear-gradient(90deg,#fff,#fff);border:1px solid rgba(11,22,60,0.04);padding:8px 12px}

    /* Layout */
    .container{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px;z-index:10}

    /* Card - HUD style */
    .card{background:var(--card);border-radius:12px;padding:16px;box-shadow:0 18px 50px rgba(2,8,23,0.7);border:1px solid rgba(0,255,230,0.06);transition:transform .18s ease, box-shadow .18s ease;position:relative;overflow:hidden}
    .card::before{content:'';position:absolute;inset:0;padding:1px;border-radius:12px;pointer-events:none;background:linear-gradient(90deg, rgba(0,255,230,0.03), rgba(139,92,246,0.02));mix-blend-mode:screen}
    .card:hover{transform:translateY(-6px);box-shadow:0 36px 90px rgba(2,8,23,0.8)}
    .card-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;display:flex;gap:8px;align-items:center}
    .card-title:before{content:'';width:10px;height:10px;border-radius:2px;background:linear-gradient(90deg,var(--neon-1),var(--neon-2));box-shadow:0 8px 28px rgba(0,255,230,0.06)}
    .metric{font-size:36px;font-weight:800;color:var(--neon-1);font-family:'Orbitron',sans-serif;text-shadow:0 10px 30px rgba(0,255,230,0.06)}
    .unit{font-size:12px;color:var(--muted);margin-left:6px}

    /* Footer */
    .footer{z-index:10;text-align:center;padding:12px;color:var(--muted);font-size:13px}

    /* Responsive tweaks */
    @media (max-width:640px){
      .title{font-size:20px}
      .tab{font-size:13px;padding:8px 12px}
      .metric{font-size:34px}
      .container{padding-bottom:40px}
    }
  </style>
</head>
<body>
  <div class="bubbles" aria-hidden="true">
    <div class="bubble b1"></div>
    <div class="bubble b2"></div>
    <div class="bubble b3"></div>
  </div>

  <!-- Header -->
  <div class="header">

    <div class="title-row">
      <div class="title">Health Monitor Analytics</div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab tab-priorityPRO" onclick="location.href='advanced.html'">Advanced-AI MODE</div>
      <div class="tab tab-priority" onclick="location.href='trends.html'">Trends</div>

      <div class="tab">Steps</div>
      <div class="tab">HR</div>
      <div class="tab">HRV</div>
      <div class="tab">Stress</div>
      <div class="tab">Sleep</div>
    </div>

  </div>

  <!-- Dashboard -->
  <div class="container">
<div class="card">
  <div class="card-title">Steps (24h)</div>
  <div class="metric" id="steps">-- <span class="unit">steps</span></div>
</div>

<div class="card">
  <div class="card-title">Heart Rate</div>
  <div class="metric" id="hr">-- <span class="unit">bpm</span></div>
</div>

<div class="card">
  <div class="card-title">HRV</div>
  <div class="metric" id="hrv">-- <span class="unit">ms</span></div>
</div> <div class="card">
  <div class="card-title">Stress</div>
  <div class="metric" id="stress">-- <span class="unit">level</span></div>
</div> <div class="card">
  <div class="card-title">Sleep</div>
  <div class="metric" id="sleep">-- <span class="unit">hours</span></div>
</div>
  </div>

  <!-- Footer -->
  <div class="footer">
    CC0 License • 2026 • C-A Software
  </div>

  <!-- Data Fetch -->
 <script>
(function () {
  console.log('CA: init script');
  const FETCH_URL = "https://compu-alert-s3.s3.us-east-2.amazonaws.com/User-Main/test-2.json";
  const STORAGE_KEY = "ca:data";
  const STORAGE_TS_KEY = "ca:data_ts";
  const REFRESH_INTERVAL = 1500; // 1.5s

  function updateUI(data) {
    console.log('CA: updateUI', data);
    if (!data) return;

    const stepsEl = document.getElementById('steps');
    const hrEl = document.getElementById('hr');
    const sleepEl = document.getElementById('sleep');
    const stressEl = document.getElementById('stress');
    const hrvEl = document.getElementById('hrv');

    function getVal(obj, ...keys) {
      for (const k of keys) {
        if (obj && obj[k] !== undefined && obj[k] !== null) return obj[k];
      }
      return '--';
    }

    function setMetric(el, value, unitText) {
      if (!el) return;
      el.textContent = `${value} `;
      const unit = document.createElement('span');
      unit.className = 'unit';
      unit.textContent = unitText;
      el.appendChild(unit);
    }

    setMetric(stepsEl, getVal(data, 'steps', 'step_count'), 'steps');
    setMetric(hrEl, getVal(data, 'heart_rate', 'hr', 'avgHeartRate', 'avg_heart_rate'), 'bpm');
    setMetric(hrvEl, getVal(data, 'hrv', 'HRV', 'avgHRV', 'rmssd'), 'ms');
    setMetric(stressEl, getVal(data, 'stress', 'stressLevel', 'stress_level'), 'level');
    setMetric(sleepEl, getVal(data, 'sleep', 'sleepHours', 'sleep_hours', 'hours'), 'hours');
  }

  async function fetchAndStore() {
    try {
      console.log('CA: fetchAndStore requesting', FETCH_URL);
      const res = await fetch(FETCH_URL);
      if (!res.ok) throw new Error('Network response not ok');
      const data = await res.json();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      localStorage.setItem(STORAGE_TS_KEY, String(Date.now()));
      updateUI(data);
    } catch (e) {
      console.error('Fetch failure:', e);
      // fallback: load from cache if available
      const cached = loadFromCache();
      if (cached) updateUI(cached);
    }
  }

  function loadFromCache() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch (e) {
      console.warn('Failed to parse cached data', e);
      return null;
    }
  }

  // Load cached data immediately (if any)
  const cached = loadFromCache();
  if (cached) updateUI(cached);

  // Fetch fresh data immediately
  fetchAndStore();

  // Optional: keep refreshing every REFRESH_INTERVAL
  setInterval(fetchAndStore, REFRESH_INTERVAL);

})();
</script>
